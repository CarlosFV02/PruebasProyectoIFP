<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Battleship Board</title>
  <script src="https://unpkg.com/streamlit-component-lib@1.4.0/dist/index.js"></script>
  <style>
    :root {
      --cell-size: 42px;
      --gap: 4px;
      --radius: 8px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 10px;
      font-family: var(--font);
      background: white;
    }

    .wrapper {
      width: fit-content;
      user-select: none;
    }

    .header-row,
    .board-row {
      display: grid;
      grid-template-columns: 26px repeat(10, var(--cell-size));
      gap: var(--gap);
      margin-bottom: var(--gap);
      align-items: center;
    }

    .coord {
      width: 26px;
      text-align: center;
      font-weight: 700;
      color: #1f2937;
      font-size: 14px;
    }

    .top-coord {
      width: var(--cell-size);
      text-align: center;
      font-weight: 700;
      color: #1f2937;
      font-size: 14px;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: var(--radius);
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.06s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .cell:hover {
      transform: scale(1.03);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.18);
    }

    .cell:active {
      transform: scale(0.98);
    }

    .unknown {
      background: #f8fafc;
      color: #6b7280;
    }

    .water {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .ship {
      background: #93c5fd;
      color: #0f172a;
    }

    .hit {
      background: #f59e0b;
      color: white;
    }

    .sunk {
      background: #ef4444;
      color: white;
    }

    .preview-ok {
      background: #86efac !important;
      color: #14532d !important;
      border: 2px solid #22c55e !important;
    }

    .preview-bad {
      background: #fecaca !important;
      color: #991b1b !important;
      border: 2px solid #ef4444 !important;
    }

    .selected {
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.35);
    }

    .legend {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const Streamlit = window.Streamlit
    const BOARD_SIZE = 10
    const LETTERS = "ABCDEFGHIJ".split("")

    let currentArgs = {}

    function getPreviewCells(anchor, shipLength, orientation) {
      if (!anchor) return []
      const [row, col] = anchor
      const cells = []

      if (orientation === "Horizontal") {
        for (let j = 0; j < shipLength; j++) cells.push([row, col + j])
      } else {
        for (let i = 0; i < shipLength; i++) cells.push([row + i, col])
      }

      return cells
    }

    function isValidPlacement(board, previewCells) {
      for (const [r, c] of previewCells) {
        if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return false
        if (board[r][c] !== 0) return false
      }
      return true
    }

    function classForValue(value, mode) {
      if (mode === "shots") {
        if (value === 0) return "unknown"
        if (value === 1) return "water"
        if (value === 2) return "hit"
        return "sunk"
      }

      if (value === 0) return "water"
      if (value === 1) return "ship"
      if (value === 2) return "hit"
      return "sunk"
    }

    function textForValue(value, mode) {
      if (mode === "shots") {
        if (value === 0) return ""
        if (value === 1) return "A"
        if (value === 2) return "X"
        return "H"
      }

      if (value === 0) return ""
      if (value === 1) return "B"
      if (value === 2) return "X"
      return "H"
    }

    function sendValue(payload) {
      Streamlit.setComponentValue(payload)
    }

    function render() {
      const root = document.getElementById("root")
      const {
        board = Array.from({ length: 10 }, () => Array(10).fill(0)),
        mode = "view",
        selected_ship_length = 3,
        orientation = "Horizontal",
        preview_anchor = null,
      } = currentArgs

      const previewCells = getPreviewCells(preview_anchor, selected_ship_length, orientation)
      const previewValid = isValidPlacement(board, previewCells)
      const previewSet = new Set(previewCells.map(([r, c]) => `${r},${c}`))

      root.innerHTML = ""

      const wrapper = document.createElement("div")
      wrapper.className = "wrapper"

      const header = document.createElement("div")
      header.className = "header-row"

      const emptyCorner = document.createElement("div")
      emptyCorner.className = "coord"
      header.appendChild(emptyCorner)

      for (const letter of LETTERS) {
        const cell = document.createElement("div")
        cell.className = "top-coord"
        cell.textContent = letter
        header.appendChild(cell)
      }

      wrapper.appendChild(header)

      for (let r = 0; r < BOARD_SIZE; r++) {
        const rowEl = document.createElement("div")
        rowEl.className = "board-row"

        const rowLabel = document.createElement("div")
        rowLabel.className = "coord"
        rowLabel.textContent = String(r + 1)
        rowEl.appendChild(rowLabel)

        for (let c = 0; c < BOARD_SIZE; c++) {
          const value = board[r][c]
          const cell = document.createElement("div")
          cell.className = `cell ${classForValue(value, mode)}`
          cell.textContent = textForValue(value, mode)

          const inPreview = previewSet.has(`${r},${c}`)
          if (inPreview) {
            cell.classList.add(previewValid ? "preview-ok" : "preview-bad")
            if (preview_anchor && preview_anchor[0] === r && preview_anchor[1] === c) {
              cell.classList.add("selected")
            }
          }

          cell.addEventListener("mouseenter", () => {
            if (mode === "placement") {
              sendValue({
                type: "hover",
                row: r,
                col: c
              })
            }
          })

          cell.addEventListener("click", () => {
            sendValue({
              type: "click",
              row: r,
              col: c
            })
          })

          rowEl.appendChild(cell)
        }

        wrapper.appendChild(rowEl)
      }

      const legend = document.createElement("div")
      legend.className = "legend"
      legend.innerHTML =
        mode === "placement"
          ? "Verde = colocación válida · Rojo = colocación inválida"
          : "A = agua · X = tocado · H = hundido"

      wrapper.appendChild(legend)
      root.appendChild(wrapper)

      Streamlit.setFrameHeight()
    }

    function onRender(event) {
      currentArgs = event.detail.args
      render()
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender)
    Streamlit.setComponentReady()
    Streamlit.setFrameHeight()
  </script>
</body>
</html>
